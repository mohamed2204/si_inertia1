# 1. Redirection automatique HTTP (80) -> HTTPS (443)
server {
    listen 80;
    listen [::]:80;
    server_name si-app.domain.lan;
    return 301 https://$host$request_uri;
}

# 2. Serveur Principal HTTPS (443)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name si-app.domain.lan;

    root /var/www/public;
    index index.php index.html;

    # Chemins internes au conteneur Nginx (via votre volume relatif)
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # Optimisations SSL standards
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Configuration Laravel classique
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement PHP-FPM adapté pour Docker Alpine
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Pointage vers le conteneur PHP-FPM de la stack
        fastcgi_pass app:9000; 
        fastcgi_index index.php;
        
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Reverse Proxy pour Vite (npm run dev) via Docker
    location /@vite/ {
        proxy_pass http://app:5173; # 'app' correspond au conteneur gérant l'application
        proxy_http_version 1.1;
        
        # Gestion des Websockets pour le Hot Reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # En-têtes de transmission indispensables
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /resources/ {
        proxy_pass http://app:5173;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        proxy_ssl_verify off;
    }

    location ~ /\.ht {
        deny all;
    }
}