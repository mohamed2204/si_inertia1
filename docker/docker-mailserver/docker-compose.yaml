services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: mail.local
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - ./certs/server.crt:/etc/letsencrypt/live/local.test/fullchain.pem:ro
      - ./certs/server.key:/etc/letsencrypt/live/local.test/privkey.pem:ro
      - ./docker-data/dms/mail-data:/var/mail
      - ./docker-data/dms/mail-state:/var/mail-state
      - ./docker-data/dms/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
    environment:
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/etc/letsencrypt/live/local.test/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/live/local.test/privkey.pem
      # --- CORRECTIONS POUR LE LOCAL ---
      - ENABLE_SASL_AUTH=1
      - DOVECOT_TLS=no        # Autorise Dovecot à écouter en non-TLS sur le port 143
      - PERMIT_DOCKER=network    # Autorise les conteneurs du même réseau
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - AMAVIS_LOG_LEVEL=0
      # Autorise le passage des mails avec des en-têtes invalides
      - P_AMAVIS_BAD_HEADER_QUARANTINE_METHOD=null
    restart: always

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: webmail
    ports:
      - "8080:80"
    volumes:
      #- ./webmail:/var/www/html
      # On monte notre DOSSIER de config personnalisé dans le dossier prévu par Roundcube
      - ./config/config.d/custom.inc.php:/var/www/html/config/custom.inc.php:ro
      #- ./config/config.d:/var/www/html/config/config.d:ro
    environment:
      # On se connecte en clair en interne (port 143/25)
      # car Nginx gère déjà le SSL vers l'extérieur
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_CONNECTION_PROXIES=1 # Utile si Nginx est devant
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=25
      # Ajoutez ces lignes pour l'authentification :
      - ROUNDCUBEMAIL_SMTP_AUTH_TYPE=PLAIN
      - ROUNDCUBEMAIL_SMTP_USER=%u
      - ROUNDCUBEMAIL_SMTP_PASS=%p
      # Personnaliser Roundcube
      # Nom affiché dans l'onglet du navigateur
      - ROUNDCUBEMAIL_PRODUCT_NAME=Mon Mail Local
      # Taille max des pièces jointes (ex: 20 Mo)
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=20M
      # Activer des plugins utiles
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,managesieve
      # Utilisez la variable d'environnement spéciale de Roundcube pour forcer l'inclusion de ce fichier
      - ROUNDCUBEMAIL_EXTRA_CONFIG=include('/var/www/html/config/custom.inc.php');
    depends_on:
      - mailserver
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/server.crt:/etc/nginx/certs/nginx-selfsigned.crt:ro
      - ./certs/server.key:/etc/nginx/certs/nginx-selfsigned.key:ro
    depends_on:
      - webmail