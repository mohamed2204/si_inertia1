# 1. Redirection automatique HTTP (80) -> HTTPS (443)
server {
    listen 80;
    listen [::]:80;
    server_name si-app.domain.lan;
    return 301 https://$host$request_uri;
}

# 2. Serveur Principal HTTPS (443)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name si-app.domain.lan;

    root /var/www/si/public; # Mettez le chemin réel de votre projet Laravel
    index index.php index.html;

    # Chemins vers les certificats OpenSSL générés
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    # Optimisations SSL standards
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Configuration Laravel classique
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock; # Vérifiez votre version de PHP
    }

    # Reverse Proxy pour Vite (npm run dev) en mode Sécurisé
    # Capturer les requêtes de hot-reload et scripts Vite
    location /@vite/ {
        proxy_pass https://127.0.0.1:5173;
        proxy_http_version 1.1;
        
        # Gestion des Websockets pour le Hot Reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # En-têtes de transmission indispensables
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /resources/ {
        proxy_pass https://127.0.0.1:5173;
        proxy_http_version 1.1;
        
        # Au cas où Vite passe des scripts en websocket ici aussi
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Évite que Nginx mette en cache les fichiers JS/CSS modifiés en dev
        proxy_cache_bypass $http_upgrade;
        
        # Indispensable pour que Nginx accepte le certificat auto-signé interne de Vite
        proxy_ssl_verify off;
    }

    location ~ /\.ht {
        deny all;
    }
}
