server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public; # <--- Pointage vers le dossier public Laravel

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
      
      	# On pointe vers le NOM DU SERVICE PHP et son port 9000
      
      	# old : fastcgi_pass php_app1_si:9000;
        # On définit un résolveur interne Docker (le DNS interne de Docker est toujours 127.0.0.11)
        
		resolver 127.0.0.11 valid=30s;
		set $upstream_php php_app1_si;
		fastcgi_pass $upstream_php:9000;
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}