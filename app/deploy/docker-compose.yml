version: "3.8"

services:
  php:
    build: .
    container_name: app1_php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - proxy-net

  nginx:
    image: nginx:latest
    container_name: app1_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - proxy-net

  db:
    image: mysql:8.0
    container_name: app1_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - proxy-net

  redis:
    image: redis:alpine
    container_name: app1_redis
    restart: unless-stopped
    networks:
      - proxy-net

  queue:
    build: .
    container_name: app1_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - proxy-net

  scheduler:
    build: .
    container_name: app1_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - proxy-net

  horizon:
    build: .
    container_name: app1_horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./src:/var/www/html
    depends_on:
      - redis
    networks:
      - proxy-net

volumes:
  db_data:

networks:
  proxy-net:
    external: true